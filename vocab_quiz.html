<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; }
  #app { width: 100%; max-width: 680px; }
  #topbar { display: flex; justify-content: space-between; font-size: 16px; color: #555; margin-bottom: 10px; font-weight: bold; }
  #question { font-size: 52px; text-align: center; margin: 16px 0 28px; color: #222; font-family: serif; line-height: 1.2; }
  #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .opt { border: none; border-radius: 14px; padding: 24px 12px; font-size: 24px; font-weight: bold; color: #fff; cursor: pointer; transition: transform 0.1s; }
  .opt:active { transform: scale(0.97); }
  .blue   { background: #3A9BD5; box-shadow: 0 5px 0 #1e6fa0; }
  .red    { background: #D94550; box-shadow: 0 5px 0 #9b2b34; }
  .orange { background: #E8811F; box-shadow: 0 5px 0 #a85a10; }
  .purple { background: #9B59B6; box-shadow: 0 5px 0 #6c3382; }
  .pink   { background: #D05CA3; box-shadow: 0 5px 0 #923e73; }
  .cobalt { background: #3B5BDB; box-shadow: 0 5px 0 #1e3a9e; }
  .yellow { background: #F0B429; box-shadow: 0 5px 0 #b8860b; }
  .brown  { background: #A0522D; box-shadow: 0 5px 0 #6b3318; }
  .correct { background: #27AE60 !important; box-shadow: 0 5px 0 #1a7a41 !important; }
  .wrong   { background: #95a5a6 !important; box-shadow: 0 5px 0 #7f8c8d !important; opacity: 0.55; }
  #result-msg { text-align: center; font-size: 20px; margin-top: 18px; min-height: 30px; color: #333; font-weight: bold; }
  #bottombar { display: flex; justify-content: center; align-items: center; gap: 24px; margin-top: 20px; font-size: 15px; color: #555; }
  #nav-prev, #nav-next { background: none; border: none; cursor: pointer; font-size: 22px; color: #aaa; }
  #nav-prev:hover, #nav-next:hover { color: #555; }
  #finish-screen { display: none; text-align: center; padding: 40px 20px; background: #fff; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  #finish-screen h2 { font-size: 36px; margin-bottom: 12px; }
  #finish-screen p { font-size: 20px; color: #555; margin-bottom: 24px; }
  #restart-btn { background: #3A9BD5; color: #fff; border: none; border-radius: 12px; padding: 14px 40px; font-size: 18px; cursor: pointer; font-weight: bold; }
  #restart-btn:hover { background: #2980b9; }
</style>
</head>
<body>
<div id="app">
  <div id="quiz-screen">
    <div id="topbar">
      <span id="timer">0:00</span>
      <span id="score-area">✓ 0</span>
    </div>
    <div id="question"></div>
    <div id="grid"></div>
    <div id="result-msg"></div>
    <div id="bottombar">
      <button id="nav-prev">◁</button>
      <span id="progress"></span>
      <button id="nav-next">▷</button>
    </div>
  </div>
  <div id="finish-screen">
    <h2>🎉 Finished!</h2>
    <p id="final-score"></p>
    <button id="restart-btn">Try Again</button>
  </div>
</div>

<script>
const ALL_WORDS = [
  { en: 'meat',       jp: 'にく' },
  { en: 'steak',      jp: 'ステーキ' },
  { en: 'sausage',    jp: 'ソーセージ' },
  { en: 'fruit',      jp: '果物' },
  { en: 'cherry',     jp: 'さくらんぼ' },
  { en: 'strawberry', jp: 'いちご' },
  { en: 'pineapple',  jp: 'パイナップル' },
  { en: 'pumpkin',    jp: 'かぼちゃ' },
  { en: 'onion',      jp: '玉ねぎ' },
  { en: 'snack',      jp: 'おやつ' },
];

const COLORS = ['blue','red','orange','purple','pink','cobalt','yellow','brown'];

let questions = [], current = 0, score = 0, answered = false, seconds = 0, timerInterval;

function shuffle(arr){ return arr.slice().sort(()=>Math.random()-0.5); }

function buildQuestions(){
  return shuffle(ALL_WORDS).map(item => {
    const wrong = shuffle(ALL_WORDS.filter(w => w.en !== item.en)).slice(0,3).map(w => w.en);
    const options = shuffle([item.en, ...wrong]);
    return { q: item.jp, answer: item.en, options };
  });
}

function render(){
  const q = questions[current];
  document.getElementById('question').textContent = q.q;
  document.getElementById('progress').textContent = (current+1)+' of '+questions.length;
  document.getElementById('result-msg').textContent = '';
  answered = false;
  const colors = shuffle(COLORS).slice(0,4);
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt ' + colors[i];
    btn.textContent = opt;
    btn.onclick = () => handleAnswer(btn, opt, q.answer);
    grid.appendChild(btn);
  });
}

function handleAnswer(btn, chosen, correct){
  if(answered) return;
  answered = true;
  document.querySelectorAll('.opt').forEach(b => {
    if(b.textContent === correct) b.classList.add('correct');
    else if(b === btn) b.classList.add('wrong');
  });
  if(chosen === correct){
    score++;
    document.getElementById('score-area').textContent = '✓ '+score;
    document.getElementById('result-msg').textContent = '✅ Correct!';
  } else {
    document.getElementById('result-msg').textContent = '❌ Answer: '+correct;
  }
  setTimeout(() => {
    if(current < questions.length - 1){ current++; render(); }
    else { showFinish(); }
  }, 1200);
}

function showFinish(){
  clearInterval(timerInterval);
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('finish-screen').style.display = 'block';
  document.getElementById('final-score').textContent = 'Score: '+score+' / '+questions.length;
}

function startQuiz(){
  questions = buildQuestions();
  current = 0; score = 0; answered = false; seconds = 0;
  document.getElementById('score-area').textContent = '✓ 0';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('finish-screen').style.display = 'none';
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    seconds++;
    const m = Math.floor(seconds/60), s = seconds%60;
    document.getElementById('timer').textContent = m+':'+(s<10?'0':'')+s;
  }, 1000);
  render();
}

document.getElementById('nav-next').onclick = () => { if(!answered && current < questions.length-1){ current++; render(); } else if(answered && current < questions.length-1){ current++; render(); } };
document.getElementById('nav-prev').onclick = () => { if(current > 0){ current--; render(); } };
document.getElementById('restart-btn').onclick = startQuiz;

startQuiz();
</script>
</body>
</html>
